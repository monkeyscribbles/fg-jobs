<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FG Jobs">
<meta name="theme-color" content="#0D1B2A">
<link rel="manifest" href="manifest.json">
<title>FG Jobs</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF5E00;
    --navy: #0D1B2A;
    --navy2: #152234;
    --navy3: #1E2F45;
    --navy4: #253650;
    --text: #E8EDF2;
    --muted: #6B8099;
    --border: rgba(255,255,255,0.07);
    --lead: #3B82F6;
    --soft: #8B5CF6;
    --sold: #F59E0B;
    --scheduled: #06B6D4;
    --inprogress: #FF5E00;
    --complete: #10B981;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--navy); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 40px; }
  header { background: var(--navy2); border-bottom: 1px solid var(--border); padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--orange); }
  .logo span { color: var(--text); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  button { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; outline: none; }
  .btn-refresh { background: var(--navy3); color: var(--muted); border: 1px solid var(--border); padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .btn-refresh:hover { color: var(--text); border-color: var(--muted); }
  .btn-add { background: var(--orange); color: white; padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; transition: all 0.2s; border: none; }
  .btn-add:hover { background: #e05400; }
  .tab-nav { display: flex; }
  .tab-btn { flex: 1; padding: 10px; font-size: 13px; font-weight: 600; color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
  .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
  .summary-bar { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); background: var(--navy2); }
  .summary-bar::-webkit-scrollbar { display: none; }
  .pill { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
  .pill-dot { width: 7px; height: 7px; border-radius: 50%; }
  .view { display: none; }
  .view.active { display: block; }
  .jobs-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .job-card { background: var(--navy2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: grab; transition: all 0.15s; position: relative; overflow: hidden; user-select: none; }
  .job-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
  .job-card:active { cursor: grabbing; opacity: 0.85; transform: scale(0.99); }
  .job-card.dragging { opacity: 0.4; }
  .job-card.drag-over { border-color: var(--orange); background: var(--navy3); }
  .job-card.status-lead::before { background: var(--lead); }
  .job-card.status-soft::before { background: var(--soft); }
  .job-card.status-sold::before { background: var(--sold); }
  .job-card.status-scheduled::before { background: var(--scheduled); }
  .job-card.status-inprogress::before { background: var(--inprogress); }
  .job-card.status-complete::before { background: var(--complete); }
  .job-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .job-customer { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .job-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .job-badges { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .badge { padding: 3px 9px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px; }
  .badge:hover { opacity: 0.8; }
  .badge-status-lead { background: rgba(59,130,246,0.15); color: #93C5FD; border: 1px solid rgba(59,130,246,0.3); }
  .badge-status-soft { background: rgba(139,92,246,0.15); color: #C4B5FD; border: 1px solid rgba(139,92,246,0.3); }
  .badge-status-sold { background: rgba(245,158,11,0.15); color: #FCD34D; border: 1px solid rgba(245,158,11,0.3); }
  .badge-status-scheduled { background: rgba(6,182,212,0.15); color: #67E8F9; border: 1px solid rgba(6,182,212,0.3); }
  .badge-status-inprogress { background: rgba(255,94,0,0.15); color: #FF9A5C; border: 1px solid rgba(255,94,0,0.3); }
  .badge-status-complete { background: rgba(16,185,129,0.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.3); }
  .badge-size { background: var(--navy3); color: var(--muted); border: 1px solid var(--border); }
  .badge-size:hover { color: var(--text); }
  .badge-soft { background: rgba(139,92,246,0.1); color: #C4B5FD; border: 1px solid rgba(139,92,246,0.25); }
  .job-scope { font-size: 12px; color: var(--muted); line-height: 1.4; margin-bottom: 8px; }
  .job-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .job-next { font-size: 11px; color: var(--muted); font-style: italic; flex: 1; }
  .job-next.urgent { color: #FCA5A5; }
  .job-actions { display: flex; gap: 6px; }
  .btn-icon { background: var(--navy3); border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn-icon:hover { color: var(--text); border-color: var(--muted); }
  .btn-icon.danger:hover { color: #FCA5A5; border-color: #FCA5A5; }
  .phone-link { color: var(--orange); font-size: 11px; text-decoration: none; font-weight: 500; }
  .phone-link:hover { text-decoration: underline; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }
  .empty-state p { font-size: 13px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  /* UPDATES */
  .updates-view { padding: 16px; }
  .note-input-area { background: var(--navy2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; }
  .note-input-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; display: block; }
  .note-textarea { width: 100%; background: var(--navy3); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; resize: none; min-height: 100px; transition: border-color 0.15s; line-height: 1.5; }
  .note-textarea:focus { outline: none; border-color: var(--orange); }
  .note-textarea::placeholder { color: var(--muted); }
  .note-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .btn-mic { background: var(--navy3); border: 1px solid var(--border); color: var(--muted); width: 42px; height: 42px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
  .btn-mic:hover { border-color: var(--orange); color: var(--orange); }
  .btn-mic.recording { background: rgba(255,94,0,0.15); border-color: var(--orange); color: var(--orange); animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .btn-parse { flex: 1; background: var(--orange); color: white; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-parse:hover { background: #e05400; }
  .btn-parse:disabled { opacity: 0.5; cursor: not-allowed; }
  .timestamp-note { font-size: 11px; color: var(--muted); margin-top: 8px; font-style: italic; }
  .parse-results { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .parse-results-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .result-card { background: var(--navy2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .result-card.match { border-color: rgba(16,185,129,0.3); }
  .result-card.new-lead { border-color: rgba(59,130,246,0.3); }
  .result-card.ambiguous { border-color: rgba(245,158,11,0.3); }
  .result-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .result-type.match { color: #6EE7B7; }
  .result-type.new-lead { color: #93C5FD; }
  .result-type.ambiguous { color: #FCD34D; }
  .result-summary { font-size: 14px; color: var(--text); line-height: 1.4; margin-bottom: 12px; }
  .result-actions { display: flex; gap: 8px; }
  .btn-approve { flex: 1; background: var(--complete); color: white; padding: 9px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-approve:hover { background: #0ea573; }
  .btn-dismiss { background: var(--navy3); color: var(--muted); padding: 9px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-dismiss:hover { color: var(--text); }
  .btn-approve-all { width: 100%; background: var(--orange); color: white; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; margin-bottom: 16px; }
  .btn-approve-all:hover { background: #e05400; }
  .parsing-indicator { text-align: center; padding: 30px; color: var(--muted); }
  .parsing-indicator .spin { font-size: 24px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 10px; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--navy2); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 24px 20px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--orange); margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea { width: 100%; background: var(--navy3); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; transition: border-color 0.15s; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--orange); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--navy3); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .toggle-label { font-size: 13px; color: var(--text); }
  .toggle-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .toggle { width: 44px; height: 24px; background: var(--navy3); border: 1px solid var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: all 0.2s; }
  .toggle.on { background: var(--soft); border-color: var(--soft); }
  .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: left 0.2s; }
  .toggle.on::after { left: 22px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save { flex: 1; background: var(--orange); color: white; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-save:hover { background: #e05400; }
  .btn-cancel { background: var(--navy3); color: var(--muted); padding: 12px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-cancel:hover { color: var(--text); }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy3); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 300; transition: transform 0.3s; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--complete); color: #6EE7B7; }
  .toast.error { border-color: #EF4444; color: #FCA5A5; }
  @media (min-width: 600px) {
    .jobs-list { max-width: 680px; margin: 0 auto; }
    .summary-bar { justify-content: center; }
    .modal { border-radius: 16px; margin-bottom: 40px; }
    .modal-overlay { align-items: center; }
    .updates-view { max-width: 680px; margin: 0 auto; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">FG <span>JOBS</span></div>
    <div class="header-actions" id="jobsHeaderActions">
      <button class="btn-refresh" onclick="loadJobs()">↻ Refresh</button>
      <button class="btn-add" onclick="openModal()">+ Add</button>
    </div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('jobs')">JOBS</button>
    <button class="tab-btn" onclick="switchTab('updates')">UPDATES</button>
  </div>
</header>

<div class="summary-bar" id="summaryBar"></div>

<div class="view active" id="jobsView">
  <div class="jobs-list" id="jobsList">
    <div class="loading">Loading jobs...</div>
  </div>
</div>

<div class="view" id="updatesView">
  <div class="updates-view">
    <div class="note-input-area">
      <span class="note-input-label">What's happening?</span>
      <textarea class="note-textarea" id="noteInput" placeholder="Speak or type... 'Called Shane back, he wants to schedule for next week' or 'New lead: Roger Harris at 123 Elm St, wants gutter estimate'"></textarea>
      <div class="note-actions">
        <button class="btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
        <button class="btn-parse" id="parseBtn" onclick="parseNote()">Parse & Review</button>
      </div>
      <div class="timestamp-note" id="timestampNote">Note will be auto-timestamped when parsed</div>
    </div>
    <div id="parseResults"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">NEW JOB</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="f_date" placeholder="4/24" />
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="f_phone" placeholder="919-555-0000" type="tel" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Customer</label>
      <input class="form-input" id="f_customer" placeholder="Name" />
    </div>
    <div class="form-group">
      <label class="form-label">Address</label>
      <input class="form-input" id="f_address" placeholder="123 Main St, Mebane" />
    </div>
    <div class="form-group">
      <label class="form-label">Scope</label>
      <textarea class="form-textarea" id="f_scope" placeholder="What's the job?"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Price</label>
        <input class="form-input" id="f_price" placeholder="$0" />
      </div>
      <div class="form-group">
        <label class="form-label">Size</label>
        <select class="form-select" id="f_size">
          <option value="">Unknown</option>
          <option value="Quarter Day">Quarter Day</option>
          <option value="Half Day">Half Day</option>
          <option value="Full Day">Full Day</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="f_status">
          <option value="Lead - New">Lead - New</option>
          <option value="Soft Hold">Soft Hold</option>
          <option value="Sold">Sold</option>
          <option value="Scheduled">Scheduled</option>
          <option value="In Progress">In Progress</option>
          <option value="Complete - Paid">Complete - Paid</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Confidence</label>
        <select class="form-select" id="f_confidence">
          <option value="">—</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Follow-up Date</label>
      <input class="form-input" id="f_follow_up_date" placeholder="4/30" />
    </div>
    <div class="form-group">
      <label class="form-label">Next Action</label>
      <input class="form-input" id="f_next_action" placeholder="What needs to happen?" />
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Soft Hold</div>
        <div class="toggle-sub">Reserve mentally, no commitment yet</div>
      </div>
      <div class="toggle" id="f_soft_hold_toggle" onclick="toggleSoftHold()"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveJob()">Save Job</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://nclwjorfiqnxckvsaxau.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ouSkRdsRBb5Wu5wACfvLtA_nYY8_VMR';

const STATUSES = ['Lead - New', 'Soft Hold', 'Sold', 'Scheduled', 'In Progress', 'Complete - Paid'];
const SIZES = ['', 'Quarter Day', 'Half Day', 'Full Day'];

let jobs = [];
let editingId = null;
let softHoldValue = false;
let dragSrcIdx = null;
let recognition = null;
let isRecording = false;
let pendingResults = [];

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'jobs') || (i === 1 && tab === 'updates'));
  });
  document.getElementById('jobsView').classList.toggle('active', tab === 'jobs');
  document.getElementById('updatesView').classList.toggle('active', tab === 'updates');
  document.getElementById('jobsHeaderActions').style.display = tab === 'jobs' ? 'flex' : 'none';
  document.getElementById('summaryBar').style.display = tab === 'jobs' ? 'flex' : 'none';
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + '/rest/v1' + path, opts);
  if (method === 'GET' || opts.headers['Prefer'] === 'return=representation') return res.json();
  return res;
}

async function loadJobs() {
  try {
    const data = await api('GET', '/jobs?order=position.asc.nullslast,created_at.asc');
    jobs = data;
    renderJobs();
    renderSummary();
  } catch(e) {
    document.getElementById('jobsList').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Connection Error</h3><p>' + e.message + '</p></div>';
  }
}

function statusClass(status) {
  if (!status) return 'lead';
  const s = status.toLowerCase();
  if (s.includes('soft')) return 'soft';
  if (s.includes('sold')) return 'sold';
  if (s.includes('scheduled')) return 'scheduled';
  if (s.includes('progress')) return 'inprogress';
  if (s.includes('complete')) return 'complete';
  return 'lead';
}

function statusColor(status) {
  const map = { lead:'#3B82F6', soft:'#8B5CF6', sold:'#F59E0B', scheduled:'#06B6D4', inprogress:'#FF5E00', complete:'#10B981' };
  return map[statusClass(status)] || '#3B82F6';
}

function renderSummary() {
  const counts = {};
  STATUSES.forEach(s => counts[s] = 0);
  jobs.forEach(j => { if (counts[j.status] !== undefined) counts[j.status]++; });
  document.getElementById('summaryBar').innerHTML = STATUSES.map(s => {
    const c = counts[s];
    if (c === 0) return '';
    const color = statusColor(s);
    return '<div class="pill" style="background:' + color + '18;border-color:' + color + '30"><div class="pill-dot" style="background:' + color + '"></div><span style="color:' + color + '">' + s.replace(' - New','').replace(' - Paid','') + ' ' + c + '</span></div>';
  }).join('');
}

function renderJobs() {
  const list = document.getElementById('jobsList');
  if (!jobs.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🏠</div><h3>No jobs yet</h3><p>Tap + Add to get started</p></div>';
    return;
  }
  list.innerHTML = jobs.map((j, i) => {
    const sc = statusClass(j.status);
    const isUrgent = j.next_action && j.next_action.toLowerCase().includes('day');
    return '<div class="job-card status-' + sc + '" draggable="true" data-id="' + j.id + '" data-idx="' + i + '" ondragstart="dragStart(event,' + i + ')" ondragover="dragOver(event)" ondrop="dragDrop(event,' + i + ')" ondragend="dragEnd(event)">' +
      '<div class="job-top"><div><div class="job-customer">' + (j.customer || 'Unknown') + '</div><div class="job-date">' + (j.address || '') + (j.date ? ' · ' + j.date : '') + '</div></div>' +
      '<div class="job-badges"><div class="badge badge-status-' + sc + '" onclick="cycleStatus(\'' + j.id + '\',\'' + j.status + '\')">' + (j.status || 'Lead') + '</div>' +
      (j.size ? '<div class="badge badge-size" onclick="cycleSize(\'' + j.id + '\',\'' + j.size + '\')">' + j.size + '</div>' : '<div class="badge badge-size" onclick="cycleSize(\'' + j.id + '\',\'\')">+ Size</div>') +
      (j.soft_hold ? '<div class="badge badge-soft">Soft Hold</div>' : '') + '</div></div>' +
      (j.scope ? '<div class="job-scope">' + j.scope + '</div>' : '') +
      '<div class="job-footer"><div>' +
      (j.phone ? '<a class="phone-link" href="tel:' + j.phone + '">📞 ' + j.phone + '</a>' : '') +
      (j.next_action ? '<div class="job-next' + (isUrgent ? ' urgent' : '') + '">→ ' + j.next_action + '</div>' : '') +
      (j.follow_up_date ? '<div class="job-next">📅 Follow up: ' + j.follow_up_date + '</div>' : '') +
      '</div><div class="job-actions"><div class="btn-icon" onclick="openModal(\'' + j.id + '\')">✏️</div><div class="btn-icon danger" onclick="deleteJob(\'' + j.id + '\')">🗑</div></div></div></div>';
  }).join('');
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showToast('Voice not supported in this browser', 'error');
    return;
  }
  if (isRecording) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').classList.add('recording'); document.getElementById('micBtn').textContent = '⏹'; };
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    const textarea = document.getElementById('noteInput');
    textarea.value = (textarea.value ? textarea.value + ' ' : '') + transcript;
  };
  recognition.onerror = (e) => { showToast('Voice error: ' + e.error, 'error'); };
  recognition.onend = () => { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); document.getElementById('micBtn').textContent = '🎤'; };
  recognition.start();
}

async function parseNote() {
  const note = document.getElementById('noteInput').value.trim();
  if (!note) { showToast('Enter a note first', 'error'); return; }

  const timestamp = new Date().toLocaleString('en-US', { month: 'numeric', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
  document.getElementById('timestampNote').textContent = 'Logged: ' + timestamp;

  const parseBtn = document.getElementById('parseBtn');
  parseBtn.disabled = true;
  parseBtn.textContent = 'Parsing...';

  document.getElementById('parseResults').innerHTML = '<div class="parsing-indicator"><div class="spin">⚙️</div><div>Analyzing your note...</div></div>';

  try {
    await api('POST', '/notes_log', { raw_note: note, timestamp: new Date().toISOString() });
  } catch(e) { console.log('Log save failed', e); }

  const jobContext = jobs.map(j => 'ID:' + j.id + ' | ' + j.customer + ' | ' + (j.address || '') + ' | Status:' + j.status).join('\n');

  const prompt = 'You are a job tracker assistant for Freedom Gutters, a gutter installation company.\n\nCurrent jobs:\n' + (jobContext || 'No jobs yet') + '\n\nUser note (timestamped ' + timestamp + '):\n"' + note + '"\n\nReturn ONLY a JSON array of actions:\n1. Match update: {"type":"match","job_id":"<id>","summary":"what changed","changes":{"status":"...","next_action":"...","size":"...","price":"...","notes":"..."}}\n2. New lead: {"type":"new_lead","summary":"description","data":{"customer":"...","address":"...","phone":"...","scope":"...","status":"Lead - New","size":"...","next_action":"..."}}\n3. Unmatched: {"type":"unmatched","summary":"could not match"}\n\nStatus values must be exactly: "Lead - New", "Soft Hold", "Sold", "Scheduled", "In Progress", "Complete - Paid"\nSize values: "Quarter Day", "Half Day", "Full Day"\nReturn ONLY the JSON array, no other text.';

  try {
    const response = await fetch('/.netlify/functions/claude-proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    if (!data.content || !data.content[0]) throw new Error("API error: " + JSON.stringify(data));
    let text = data.content[0].text.trim();
    // Strip markdown code fences if present
    text = text.replace(/```json/g, '').replace(/```/g, '').trim();
    // Extract JSON array
    const start = text.indexOf('[');
    const end = text.lastIndexOf(']');
    if (start === -1 || end === -1) throw new Error("No JSON array in response: " + text.substring(0, 150));
    const actions = JSON.parse(text.substring(start, end + 1));
    pendingResults = actions;
    renderParseResults(actions);

  } catch(e) {
    document.getElementById('parseResults').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Parse failed</h3><p>' + e.message + '</p></div>';
  }

  parseBtn.disabled = false;
  parseBtn.textContent = 'Parse & Review';
}

function renderParseResults(actions) {
  if (!actions.length) {
    document.getElementById('parseResults').innerHTML = '<div class="empty-state"><div class="icon">🤷</div><h3>Nothing to parse</h3><p>Try adding more detail</p></div>';
    return;
  }
  const hasMultiple = actions.filter(a => a.type !== 'unmatched').length > 1;
  let html = '<div class="parse-results-label">Review & Approve</div>';
  if (hasMultiple) html += '<button class="btn-approve-all" onclick="approveAll()">✅ Approve All</button>';
  html += '<div class="parse-results">';
  actions.forEach((action, i) => {
    let typeLabel = '', typeClass = '', cardClass = '';
    if (action.type === 'match') { typeLabel = '✓ Match Found'; typeClass = 'match'; cardClass = 'match'; }
    else if (action.type === 'new_lead') { typeLabel = '+ New Lead'; typeClass = 'new-lead'; cardClass = 'new-lead'; }
    else { typeLabel = '? Unmatched'; typeClass = 'ambiguous'; cardClass = 'ambiguous'; }
    html += '<div class="result-card ' + cardClass + '" id="result-' + i + '"><div class="result-type ' + typeClass + '">' + typeLabel + '</div><div class="result-summary">' + action.summary + '</div><div class="result-actions">' +
      (action.type !== 'unmatched' ? '<button class="btn-approve" onclick="approveAction(' + i + ')">Approve</button>' : '') +
      '<button class="btn-dismiss" onclick="dismissAction(' + i + ')">Dismiss</button></div></div>';
  });
  html += '</div>';
  document.getElementById('parseResults').innerHTML = html;
}

async function approveAction(idx) {
  const action = pendingResults[idx];
  if (!action) return;
  try {
    if (action.type === 'match' && action.job_id && action.changes) {
      await api('PATCH', '/jobs?id=eq.' + action.job_id, action.changes);
      const job = jobs.find(j => j.id === action.job_id);
      if (job) Object.assign(job, action.changes);
      showToast('Job updated ✓', 'success');
    } else if (action.type === 'new_lead' && action.data) {
      action.data.position = jobs.length + 1;
      const result = await api('POST', '/jobs', action.data);
      if (Array.isArray(result) && result[0]) jobs.push(result[0]);
      showToast('New lead added ✓', 'success');
    }
    pendingResults[idx] = null;
    document.getElementById('result-' + idx).style.opacity = '0.4';
    document.getElementById('result-' + idx).style.pointerEvents = 'none';
    renderSummary();
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function approveAll() {
  for (let i = 0; i < pendingResults.length; i++) {
    if (pendingResults[i] && pendingResults[i].type !== 'unmatched') await approveAction(i);
  }
  showToast('All approved ✓', 'success');
}

function dismissAction(idx) {
  pendingResults[idx] = null;
  document.getElementById('result-' + idx).style.opacity = '0.3';
  document.getElementById('result-' + idx).style.pointerEvents = 'none';
}

async function cycleStatus(id, current) {
  const idx = STATUSES.indexOf(current);
  const next = STATUSES[(idx + 1) % STATUSES.length];
  await api('PATCH', '/jobs?id=eq.' + id, { status: next });
  const job = jobs.find(j => j.id === id);
  if (job) job.status = next;
  renderJobs(); renderSummary();
  showToast('→ ' + next, 'success');
}

async function cycleSize(id, current) {
  const idx = SIZES.indexOf(current);
  const next = SIZES[(idx + 1) % SIZES.length];
  await api('PATCH', '/jobs?id=eq.' + id, { size: next });
  const job = jobs.find(j => j.id === id);
  if (job) job.size = next;
  renderJobs();
  showToast(next ? 'Size: ' + next : 'Size cleared', 'success');
}

async function deleteJob(id) {
  if (!confirm('Delete this job?')) return;
  await api('DELETE', '/jobs?id=eq.' + id);
  jobs = jobs.filter(j => j.id !== id);
  renderJobs(); renderSummary();
  showToast('Job deleted');
}

function dragStart(e, idx) { dragSrcIdx = idx; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; document.querySelectorAll('.job-card').forEach(c => c.classList.remove('drag-over')); e.currentTarget.classList.add('drag-over'); }
async function dragDrop(e, toIdx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === toIdx) return;
  const moved = jobs.splice(dragSrcIdx, 1)[0];
  jobs.splice(toIdx, 0, moved);
  jobs.forEach((j, i) => j.position = i + 1);
  renderJobs(); renderSummary();
  await Promise.all(jobs.map((j, i) => api('PATCH', '/jobs?id=eq.' + j.id, { position: i + 1 })));
}
function dragEnd(e) { dragSrcIdx = null; document.querySelectorAll('.job-card').forEach(c => { c.classList.remove('dragging'); c.classList.remove('drag-over'); }); }

function openModal(id) {
  editingId = id || null;
  softHoldValue = false;
  document.getElementById('modalTitle').textContent = id ? 'EDIT JOB' : 'NEW JOB';
  ['date','phone','customer','address','scope','price','size','status','confidence','follow_up_date','next_action'].forEach(f => { const el = document.getElementById('f_' + f); if (el) el.value = ''; });
  document.getElementById('f_status').value = 'Lead - New';
  document.getElementById('f_soft_hold_toggle').classList.remove('on');
  if (id) {
    const j = jobs.find(j => j.id === id);
    if (j) {
      ['date','phone','customer','address','scope','price','size','status','confidence','follow_up_date','next_action'].forEach(f => { const el = document.getElementById('f_' + f); if (el && j[f] != null) el.value = j[f]; });
      softHoldValue = j.soft_hold || false;
      if (softHoldValue) document.getElementById('f_soft_hold_toggle').classList.add('on');
    }
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
function toggleSoftHold() { softHoldValue = !softHoldValue; document.getElementById('f_soft_hold_toggle').classList.toggle('on', softHoldValue); }

async function saveJob() {
  const data = {
    customer: document.getElementById('f_customer').value.trim(),
    date: document.getElementById('f_date').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    address: document.getElementById('f_address').value.trim(),
    scope: document.getElementById('f_scope').value.trim(),
    price: document.getElementById('f_price').value.trim(),
    size: document.getElementById('f_size').value,
    status: document.getElementById('f_status').value,
    confidence: document.getElementById('f_confidence').value,
    follow_up_date: document.getElementById('f_follow_up_date').value.trim(),
    next_action: document.getElementById('f_next_action').value.trim(),
    soft_hold: softHoldValue
  };
  if (!data.customer) { showToast('Customer name required', 'error'); return; }
  if (editingId) {
    await api('PATCH', '/jobs?id=eq.' + editingId, data);
    const idx = jobs.findIndex(j => j.id === editingId);
    if (idx !== -1) jobs[idx] = Object.assign({}, jobs[idx], data);
    showToast('Job updated', 'success');
  } else {
    data.position = jobs.length + 1;
    const result = await api('POST', '/jobs', data);
    if (Array.isArray(result) && result[0]) jobs.push(result[0]);
    showToast('Job added', 'success');
  }
  closeModal(); renderJobs(); renderSummary();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadJobs();
</script>
